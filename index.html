<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>Raphael Core v3 Evolution</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --text: #f3f6ff;
      --muted: rgba(243, 246, 255, 0.66);
      --danger: #ff667a;
      --ok: #56d78f;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.45);

      --bg-top: #06070d;
      --bg-mid: #070911;
      --bg-bottom: #04050a;

      --panel-a: rgba(255,255,255,0.075);
      --panel-b: rgba(255,255,255,0.045);
      --border: rgba(255,255,255,0.10);

      --orb-core: radial-gradient(circle at 35% 30%, #d8cbff 0%, #9e84ff 22%, #6441ff 46%, #24145a 68%, #090914 100%);
      --orb-glow: rgba(130, 92, 255, 0.45);
      --ring-color: rgba(155, 132, 255, 0.42);
      --mid-ring-color: rgba(196, 183, 255, 0.40);
      --sigil-opacity: 0.35;
      --halo-color: rgba(127, 98, 255, 0.22);

      --outer-spin: 14s;
      --mid-spin: 12s;
      --sigil-spin: 24s;
      --pulse-speed: 3.8s;
      --orb-scale: 1;
      --orb-brightness: 1;
      --particle-opacity: 1;
      --particle-size: 4px;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at 50% -10%, rgba(129, 93, 255, 0.18), transparent 36%),
        radial-gradient(circle at 85% 20%, rgba(82, 147, 255, 0.08), transparent 24%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 30%, var(--bg-bottom) 100%);
      overflow: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.045;
      background-image: radial-gradient(rgba(255,255,255,0.35) 0.6px, transparent 0.6px);
      background-size: 8px 8px;
      mix-blend-mode: soft-light;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100dvh;
      max-width: 920px;
      margin: 0 auto;
      padding: 12px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
    }

    .card {
      background: linear-gradient(180deg, var(--panel-a), var(--panel-b));
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .brand-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.2px;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      background: var(--ok);
      box-shadow: 0 0 10px rgba(82, 211, 139, 0.45);
    }

    .hero {
      padding: 14px 14px 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      justify-items: center;
    }

    .orb-zone {
      position: relative;
      width: min(66vw, 330px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
    }

    .halo {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      background: radial-gradient(circle, var(--halo-color) 0%, rgba(127, 98, 255, 0.08) 38%, transparent 70%);
      filter: blur(18px);
      transform: scale(1.1);
      animation: breathe 4.2s ease-in-out infinite;
    }

    .sigil-ring,
    .outer-ring,
    .mid-ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .sigil-ring {
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 59%, rgba(150,115,255,0.12) 60%, transparent 61%),
        conic-gradient(
          from 0deg,
          transparent 0deg 14deg,
          rgba(214, 205, 255, 0.85) 14deg 16deg,
          transparent 16deg 42deg,
          rgba(214, 205, 255, 0.55) 42deg 44deg,
          transparent 44deg 72deg,
          rgba(214, 205, 255, 0.85) 72deg 74deg,
          transparent 74deg 104deg,
          rgba(214, 205, 255, 0.55) 104deg 106deg,
          transparent 106deg 134deg,
          rgba(214, 205, 255, 0.85) 134deg 136deg,
          transparent 136deg 164deg,
          rgba(214, 205, 255, 0.55) 164deg 166deg,
          transparent 166deg 194deg,
          rgba(214, 205, 255, 0.85) 194deg 196deg,
          transparent 196deg 224deg,
          rgba(214, 205, 255, 0.55) 224deg 226deg,
          transparent 226deg 254deg,
          rgba(214, 205, 255, 0.85) 254deg 256deg,
          transparent 256deg 284deg,
          rgba(214, 205, 255, 0.55) 284deg 286deg,
          transparent 286deg 314deg,
          rgba(214, 205, 255, 0.85) 314deg 316deg,
          transparent 316deg 344deg,
          rgba(214, 205, 255, 0.55) 344deg 346deg,
          transparent 346deg 360deg
        );
      opacity: var(--sigil-opacity);
      animation: spin var(--sigil-spin) linear infinite;
      filter: drop-shadow(0 0 12px rgba(164, 132, 255, 0.25));
    }

    .outer-ring {
      inset: 6%;
      border: 2px solid var(--ring-color);
      box-shadow:
        0 0 22px var(--orb-glow),
        inset 0 0 18px rgba(163, 138, 255, 0.14);
      animation: spin var(--outer-spin) linear infinite;
    }

    .outer-ring::before,
    .outer-ring::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .mid-ring {
      inset: 14%;
      border: 1px dashed var(--mid-ring-color);
      animation: spinReverse var(--mid-spin) linear infinite;
      opacity: 0.9;
    }

    .orb {
      position: absolute;
      inset: 22%;
      border-radius: 50%;
      background: var(--orb-core);
      box-shadow:
        0 0 24px var(--orb-glow),
        0 0 60px rgba(107, 67, 255, 0.18),
        inset 0 0 24px rgba(255,255,255,0.12),
        inset -10px -18px 24px rgba(0,0,0,0.30);
      overflow: hidden;
      animation: orbPulse var(--pulse-speed) ease-in-out infinite;
      transform: scale(var(--orb-scale));
      filter: brightness(var(--orb-brightness));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb::before {
      content: "";
      position: absolute;
      inset: 7%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.22), transparent 26%),
        radial-gradient(circle at 65% 70%, rgba(31, 7, 94, 0.65), transparent 34%),
        radial-gradient(circle at 48% 48%, rgba(158, 133, 255, 0.16), transparent 40%);
      mix-blend-mode: screen;
    }

    .orb::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        conic-gradient(from 140deg, transparent 0 8%, rgba(255,255,255,0.08) 10%, transparent 14%, transparent 50%, rgba(255,255,255,0.07) 55%, transparent 60%);
      filter: blur(4px);
      animation: shimmer 6s linear infinite;
    }

    .orb-overlay {
      position: absolute;
      inset: 18%;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
    }

    .orb-text {
      width: 100%;
      max-width: 154px;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(244, 247, 255, 0.94);
      text-shadow: 0 0 12px rgba(0,0,0,0.5);
      word-break: break-word;
      white-space: pre-wrap;
      display: -webkit-box;
      -webkit-line-clamp: 7;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .orb-text.thinking {
      animation: pulseText 1.2s ease-in-out infinite;
      letter-spacing: 0.8px;
      font-weight: 700;
    }

    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: var(--particle-size);
      height: var(--particle-size);
      border-radius: 50%;
      background: rgba(220, 213, 255, 0.84);
      box-shadow: 0 0 10px rgba(182, 157, 255, 0.45);
      animation: floatParticle linear infinite;
      opacity: var(--particle-opacity);
    }

    .core-readout {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .readout {
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .readout-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .readout-value {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
      word-break: break-word;
    }

    .messages {
      min-height: 0;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 88%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      animation: msgIn 0.22s ease;
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(118,92,255,0.86), rgba(67,40,143,0.96));
      border: 1px solid rgba(189, 175, 255, 0.18);
      box-shadow: 0 12px 30px rgba(72, 47, 158, 0.30);
    }

    .msg.model {
      align-self: flex-start;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .composer {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .api-row,
    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .field {
      width: 100%;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 13px 14px;
      outline: none;
      font: inherit;
    }

    .field::placeholder {
      color: rgba(255,255,255,0.42);
    }

    textarea.field {
      resize: none;
      min-height: 58px;
      max-height: 130px;
    }

    .btn {
      border: none;
      outline: none;
      border-radius: 16px;
      padding: 0 16px;
      min-width: 88px;
      font: inherit;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #8b6bff, #5636ff);
      box-shadow: 0 10px 26px rgba(92, 58, 255, 0.28);
    }

    .btn.secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: none;
      color: var(--text);
    }

    .action-card {
      display: none;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      gap: 8px;
    }

    .action-card.show {
      display: grid;
    }

    .action-title {
      font-size: 11px;
      color: var(--muted);
    }

    .action-main {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.45;
    }

    .action-sub {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    .footer-note {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
      padding: 0 2px;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinReverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1.04); opacity: 0.78; }
      50% { transform: scale(1.12); opacity: 1; }
    }

    @keyframes orbPulse {
      0%, 100% { transform: scale(calc(var(--orb-scale) * 0.985)); }
      50% { transform: scale(calc(var(--orb-scale) * 1.02)); }
    }

    @keyframes shimmer {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatParticle {
      0% { transform: translate3d(0, 0, 0) scale(0.9); opacity: 0; }
      20% { opacity: var(--particle-opacity); }
      100% { transform: translate3d(var(--tx), var(--ty), 0) scale(1.2); opacity: 0; }
    }

    @keyframes pulseText {
      0%, 100% { opacity: 0.55; transform: scale(0.98); }
      50% { opacity: 1; transform: scale(1.02); }
    }

    @media (max-width: 620px) {
      .core-readout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .app {
        padding: 10px;
        gap: 10px;
      }

      .topbar {
        padding: 12px 13px;
      }

      .brand-title {
        font-size: 17px;
      }

      .api-row,
      .input-row {
        grid-template-columns: 1fr;
      }

      .btn {
        min-height: 48px;
      }

      .msg {
        max-width: 92%;
      }

      .orb-text {
        max-width: 132px;
        font-size: 11px;
        -webkit-line-clamp: 7;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="app">
    <div class="card topbar">
      <div class="brand">
        <div class="brand-title">Raphael Core</div>
        <div class="brand-sub">v3 · Evolution Memory · Auto Compression · Mobile Build</div>
      </div>
      <div class="chip-row">
        <div class="chip" id="statusChip"><span class="status-dot"></span>READY</div>
        <div class="chip" id="latencyChip">LAT -- ms</div>
      </div>
    </div>

    <div class="card hero">
      <div class="orb-zone">
        <div class="halo"></div>
        <div class="sigil-ring"></div>
        <div class="outer-ring"></div>
        <div class="mid-ring"></div>
        <div class="orb" id="orb"></div>
        <div class="orb-overlay">
          <div class="orb-text" id="orbText">RAPHAEL ONLINE</div>
        </div>
        <div class="particles" id="particles"></div>
      </div>

      <div class="core-readout">
        <div class="readout">
          <div class="readout-label">CURRENT MOOD</div>
          <div class="readout-value" id="moodValue">adaptive</div>
        </div>
        <div class="readout">
          <div class="readout-label">COGNITIVE FRAMEWORK</div>
          <div class="readout-value" id="frameworkValue">RAPHAEL_LITE</div>
        </div>
        <div class="readout">
          <div class="readout-label">SIGNAL ENGINE</div>
          <div class="readout-value" id="signalValue">idle</div>
        </div>
      </div>
    </div>

    <div class="card messages" id="messages"></div>

    <div class="card composer">
      <div class="action-card" id="actionCard">
        <div class="action-title">NEXT ACTION</div>
        <div class="action-main" id="actionMain">-</div>
        <div class="action-sub" id="actionSub">-</div>
      </div>

      <div class="api-row">
        <input
          id="apiKey"
          class="field"
          type="password"
          placeholder="Gemini API Key 입력"
        />
        <button class="btn secondary" id="saveKeyBtn">키 저장</button>
      </div>

      <div class="input-row">
        <textarea
          id="prompt"
          class="field"
          placeholder="명령 또는 메시지를 입력해라"
        ></textarea>
        <button class="btn" id="sendBtn">전송</button>
      </div>

      <div style="display:flex; gap:8px;">
        <button class="btn secondary" id="clearBtn" style="flex:1;">기록 초기화</button>
        <button class="btn secondary" id="testBtn" style="flex:1;">연결 테스트</button>
      </div>

      <div class="footer-note">
        긴 대화는 자동으로 압축되어 맥락을 유지한다. 사용자 성향과 반복 목표는 진화 메모리로 누적된다.
        서버 경유형은 <code>/api/raphael</code>만 만들면 전환된다.
      </div>
    </div>
  </div>

  <script>
    const STORAGE_MESSAGES = "raphael_core_v3_messages";
    const STORAGE_API_KEY = "raphael_core_v3_api_key";
    const STORAGE_LAST_INPUT_TIME = "raphael_core_v3_last_input_time";
    const STORAGE_SUMMARY = "raphael_core_v3_summary";
    const STORAGE_EVOLUTION = "raphael_core_v3_evolution";
    const STORAGE_CORE_MEMORY = "raphael_core_v3_core_memory";

    const API_MODE = "direct";

    const messagesEl = document.getElementById("messages");
    const promptEl = document.getElementById("prompt");
    const apiKeyEl = document.getElementById("apiKey");
    const saveKeyBtn = document.getElementById("saveKeyBtn");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const testBtn = document.getElementById("testBtn");

    const moodValue = document.getElementById("moodValue");
    const frameworkValue = document.getElementById("frameworkValue");
    const signalValue = document.getElementById("signalValue");

    const statusChip = document.getElementById("statusChip");
    const latencyChip = document.getElementById("latencyChip");
    const orb = document.getElementById("orb");
    const orbText = document.getElementById("orbText");
    const particlesEl = document.getElementById("particles");

    const actionCard = document.getElementById("actionCard");
    const actionMain = document.getElementById("actionMain");
    const actionSub = document.getElementById("actionSub");

    let chatHistory = JSON.parse(localStorage.getItem(STORAGE_MESSAGES) || "[]");
    let conversationSummary = localStorage.getItem(STORAGE_SUMMARY) || "";
    let evolutionMemory = JSON.parse(localStorage.getItem(STORAGE_EVOLUTION) || '{"principles":[],"patterns":[],"goals":[],"styleHints":[]}');
    let coreMemory = JSON.parse(localStorage.getItem(STORAGE_CORE_MEMORY) || '{"facts":[],"preferences":[],"constraints":[]}');
    let typingToken = 0;

    const savedKey = localStorage.getItem(STORAGE_API_KEY);
    if (savedKey) apiKeyEl.value = savedKey;

    function persistAll() {
      localStorage.setItem(STORAGE_MESSAGES, JSON.stringify(chatHistory));
      localStorage.setItem(STORAGE_SUMMARY, conversationSummary || "");
      localStorage.setItem(STORAGE_EVOLUTION, JSON.stringify(evolutionMemory));
      localStorage.setItem(STORAGE_CORE_MEMORY, JSON.stringify(coreMemory));
    }

    function setStatus(text, ok = true) {
      statusChip.innerHTML = '<span class="status-dot"></span>' + text;
      const dot = statusChip.querySelector(".status-dot");
      if (dot) {
        dot.style.background = ok ? "var(--ok)" : "var(--danger)";
        dot.style.boxShadow = ok
          ? "0 0 10px rgba(82, 211, 139, 0.45)"
          : "0 0 10px rgba(255, 95, 109, 0.45)";
      }
    }

    function renderMessages() {
      messagesEl.innerHTML = "";
      chatHistory.forEach((msg) => {
        const div = document.createElement("div");
        div.className = "msg " + msg.role;
        div.textContent = msg.text;
        messagesEl.appendChild(div);
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function pushMessage(role, text) {
      chatHistory.push({ role, text });
      localStorage.setItem(STORAGE_MESSAGES, JSON.stringify(chatHistory));
      renderMessages();
    }

    function setOrbMessage(text, isThinking = false) {
      typingToken++;
      orbText.textContent = text || "";
      if (isThinking) orbText.classList.add("thinking");
      else orbText.classList.remove("thinking");
    }

    async function typeOrbMessage(text, speed = 18) {
      typingToken++;
      const currentToken = typingToken;
      orbText.classList.remove("thinking");
      orbText.textContent = "";

      const finalText = text || "";
      for (let i = 0; i < finalText.length; i++) {
        if (currentToken !== typingToken) return;
        orbText.textContent += finalText[i];
        await new Promise((resolve) => setTimeout(resolve, speed));
      }
    }

    function summarizeForOrb(text) {
      if (!text) return "NO RESPONSE";
      const clean = text
        .replace(/\[EV\][\s\S]*/g, "")
        .replace(/\[다음 행동\][\s\S]*/g, "")
        .replace(/\s+/g, " ")
        .trim();

      if (clean.length <= 88) return clean;
      return clean.slice(0, 88).trim() + "...";
    }

    function showActionCard(main, sub) {
      if (!main && !sub) {
        actionCard.classList.remove("show");
        return;
      }
      actionMain.textContent = main || "-";
      actionSub.textContent = sub || "";
      actionCard.classList.add("show");
    }

    function createParticles(count = 18, speedBias = 1, spread = 40) {
      particlesEl.innerHTML = "";
      for (let i = 0; i < count; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = (50 + (Math.random() * 54 - 27)) + "%";
        p.style.top = (50 + (Math.random() * 54 - 27)) + "%";
        p.style.setProperty("--tx", (Math.random() * spread * 2 - spread) + "px");
        p.style.setProperty("--ty", (Math.random() * spread * 2 - spread) + "px");
        p.style.animationDuration = ((2.8 + Math.random() * 3.6) / speedBias) + "s";
        p.style.animationDelay = (Math.random() * 2.5) + "s";
        particlesEl.appendChild(p);
      }
    }

    function applyMoodEffects(mood, intensity = 0.5) {
      const root = document.documentElement;

      const configs = {
        focus: {

    function getLastInputTime() {
      return Number(localStorage.getItem(STORAGE_LAST_INPUT_TIME) || "0");
    }

    function setLastInputTime(ts) {
      localStorage.setItem(STORAGE_LAST_INPUT_TIME, String(ts));
    }

    function analyzeSignal(text) {
      const now = Date.now();
      const prev = getLastInputTime();
      const delta = prev ? now - prev : 999999;
      setLastInputTime(now);

      const trimmed = (text || "").trim();
      const len = trimmed.length;
      const exclam = (trimmed.match(/!/g) || []).length;
      const questions = (trimmed.match(/\?/g) || []).length;
      const urgencyWords = /(빨리|지금|급해|당장|서둘러|urgent|asap)/i.test(trimmed);
      const fatigueWords = /(피곤|졸려|지침|힘들|귀찮|tired|exhausted)/i.test(trimmed);
      const calmWords = /(천천히|정리|차분|calm|정돈)/i.test(trimmed);
      const ascendWords = /(성장|확장|업그레이드|진화|ascend|improve)/i.test(trimmed);
      const focusWords = /(분석|정리|구조|설계|코드|디버그|focus|optimize)/i.test(trimmed);

      let mood = "adaptive";
      let intensity = 0.45;

      if (fatigueWords) {
        mood = "tired";
        intensity = 0.4;
      } else if (urgencyWords || exclam >= 2) {
        mood = "rage";
        intensity = Math.min(1, 0.65 + exclam * 0.08);
      } else if (calmWords) {
        mood = "calm";
        intensity = 0.42;
      } else if (ascendWords) {
        mood = "ascend";
        intensity = 0.6;
      } else if (focusWords || questions >= 1 || len > 45) {
        mood = "focus";
        intensity = 0.56;
      }

      if (delta < 8000) intensity = Math.min(1, intensity + 0.12);
      if (len > 120) intensity = Math.min(1, intensity + 0.08);

      const label = `${mood} · i:${intensity.toFixed(2)} · dt:${Math.round(delta / 1000)}s`;
      signalValue.textContent = label;

      return {
        predictedMood: mood,
        intensity,
        inputLength: len,
        deltaMs: delta,
        exclamations: exclam,
        questions,
        urgencyWords,
        fatigueWords
      };
    }

    function uniqLimit(arr, limit = 12) {
      return [...new Set(arr.filter(Boolean).map((v) => String(v).trim()).filter(Boolean))].slice(0, limit);
    }

    function heuristicExtractEvolution(userText, aiText) {
      const goals = [...(evolutionMemory.goals || [])];
      const principles = [...(evolutionMemory.principles || [])];
      const patterns = [...(evolutionMemory.patterns || [])];
      const styleHints = [...(evolutionMemory.styleHints || [])];

      const preferences = [...(coreMemory.preferences || [])];
      const constraints = [...(coreMemory.constraints || [])];
      const facts = [...(coreMemory.facts || [])];

      const t = `${userText}\n${aiText || ""}`;

      if (/(빠르게|속도|빨리|시간없)/i.test(t)) styleHints.push("빠른 실행 선호");
      if (/(완성본|전체코드|통째로|붙여넣)/i.test(t)) styleHints.push("부분 코드보다 전체 완성본 선호");
      if (/(정체성|느낌|라파엘|오브)/i.test(t)) principles.push("중앙 코어 정체성 유지");
      if (/(자동화|레버리지|시스템)/i.test(t)) principles.push("자동화와 시스템화 우선");
      if (/(디버그|오류|에러)/i.test(t)) patterns.push("오류 발생 시 즉시 수정 루프 선호");
      if (/(장기|진화|업그레이드)/i.test(t)) goals.push("장기 진화형 구조 선호");
      if (/(폰|모바일)/i.test(t)) constraints.push("모바일 단독 사용 가능성 중요");
      if (/(Gemini|API)/i.test(t)) facts.push("Gemini 연동 사용 중");
      if (/(서버|보안|키 노출)/i.test(t)) goals.push("서버 경유 구조로 전환 필요");
      if (/(요약|압축|맥락)/i.test(t)) principles.push("긴 대화 맥락 압축 유지 필요");

      evolutionMemory = {
        goals: uniqLimit(goals, 10),
        principles: uniqLimit(principles, 12),
        patterns: uniqLimit(patterns, 12),
        styleHints: uniqLimit(styleHints, 10)
      };

      coreMemory = {
        preferences: uniqLimit(preferences, 12),
        constraints: uniqLimit(constraints, 12),
        facts: uniqLimit(facts, 12)
      };
    }

    function localCompressMessages(messages) {
      if (!messages.length) return "";

      const lines = [];
      for (const msg of messages) {
        const role = msg.role === "user" ? "USER" : "AI";
        const text = String(msg.text || "").replace(/\s+/g, " ").trim();
        if (!text) continue;
        lines.push(`${role}: ${text.slice(0, 280)}`);
      }

      const joined = lines.join("\n");
      if (joined.length <= 2200) return joined;
      return joined.slice(0, 2200) + "\n[...compressed locally]";
    }

    function buildEvolutionContext() {
      const e = evolutionMemory;
      const c = coreMemory;

      return [
        c.facts?.length ? `[KNOWN FACTS]\n- ${c.facts.join("\n- ")}` : "",
        c.constraints?.length ? `[CONSTRAINTS]\n- ${c.constraints.join("\n- ")}` : "",
        c.preferences?.length ? `[PREFERENCES]\n- ${c.preferences.join("\n- ")}` : "",
        e.goals?.length ? `[LONG-TERM GOALS]\n- ${e.goals.join("\n- ")}` : "",
        e.principles?.length ? `[LEARNED PRINCIPLES]\n- ${e.principles.join("\n- ")}` : "",
        e.patterns?.length ? `[BEHAVIOR PATTERNS]\n- ${e.patterns.join("\n- ")}` : "",
        e.styleHints?.length ? `[STYLE HINTS]\n- ${e.styleHints.join("\n- ")}` : ""
      ].filter(Boolean).join("\n\n");
    }

    function shouldCompressHistory() {
      const totalChars = chatHistory.reduce((acc, m) => acc + (m.text?.length || 0), 0);
      return chatHistory.length > 18 || totalChars > 6000;
    }

    async function maybeCompressHistory() {
      if (!shouldCompressHistory()) return;

      const older = chatHistory.slice(0, Math.max(0, chatHistory.length - 10));
      const recent = chatHistory.slice(-10);

      const localSummarySeed = localCompressMessages(older);
      const key = apiKeyEl.value.trim();

      if (!key || API_MODE !== "direct") {
        conversationSummary = [
          conversationSummary,
          "[AUTO SUMMARY]",
          localSummarySeed
        ].filter(Boolean).join("\n\n").slice(-5000);
        chatHistory = recent;
        persistAll();
        renderMessages();
        return;
      }

      try {
        const payload = {
          system_instruction: {
            parts: [{
              text: `너는 Raphael Memory Compressor다.
오래된 대화를 압축해 맥락 손실을 최소화하는 역할만 수행한다.
반드시 JSON으로만 응답:
{
  "summary": "핵심 맥락 요약",
  "facts": ["사실1"],
  "preferences": ["선호1"],
  "constraints": ["제약1"],
  "goals": ["목표1"],
  "principles": ["원칙1"]
}`
            }]
          },
          contents: [{
            role: "user",
            parts: [{
              text:
`[PREVIOUS SUMMARY]
${conversationSummary || "(none)"}

[OLDER MESSAGES]
${localSummarySeed}`
            }]
          }],
          generationConfig: {
            temperature: 0.2,
            maxOutputTokens: 500,
            responseMimeType: "application/json"
          }
        };

        const res = await fetch(
          "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + encodeURIComponent(key),
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          }
        );

        const data = await res.json();
        if (!res.ok) throw new Error(data?.error?.message || "compression failed");

        const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
        const parsed = JSON.parse(raw);

        conversationSummary = String(parsed.summary || localSummarySeed).slice(0, 5000);

        coreMemory = {
          facts: uniqLimit([...(coreMemory.facts || []), ...((parsed.facts || []).map(String))], 12),
          preferences: uniqLimit([...(coreMemory.preferences || []), ...((parsed.preferences || []).map(String))], 12),
          constraints: uniqLimit([...(coreMemory.constraints || []), ...((parsed.constraints || []).map(String))], 12)
        };

        evolutionMemory = {
          goals: uniqLimit([...(evolutionMemory.goals || []), ...((parsed.goals || []).map(String))], 12),
          principles: uniqLimit([...(evolutionMemory.principles || []), ...((parsed.principles || []).map(String))], 12),
          patterns: uniqLimit(evolutionMemory.patterns || [], 12),
          styleHints: uniqLimit(evolutionMemory.styleHints || [], 12)
        };

        chatHistory = recent;
        persistAll();
        renderMessages();
      } catch {
        conversationSummary = [
          conversationSummary,
          "[AUTO SUMMARY FALLBACK]",
          localSummarySeed
        ].filter(Boolean).join("\n\n").slice(-5000);

        chatHistory = recent;
        persistAll();
        renderMessages();
      }
    }

    function saveKey() {
      const key = apiKeyEl.value.trim();
      if (!key) {
        setStatus("KEY EMPTY", false);
        setOrbMessage("API KEY REQUIRED");
        return;
      }
      localStorage.setItem(STORAGE_API_KEY, key);
      setStatus("KEY SAVED", true);
      setOrbMessage("KEY LINKED");
    }

    function normalizeResponse(objOrText) {
      if (typeof objOrText === "object" && objOrText !== null) {
        return {
          reply: objOrText.reply || "응답 없음",
          mood: objOrText.mood || "adaptive",
          action: objOrText.action || "NONE",
          sentiment: typeof objOrText.sentiment === "number" ? objOrText.sentiment : 0.5,
          ev_estimate: objOrText.ev_estimate || "P = unknown",
          cognitive_framework: objOrText.cognitive_framework || "RAPHAEL_LITE",
          preemptive_suggestion: objOrText.preemptive_suggestion || ""
        };
      }

      return {
        reply: typeof objOrText === "string" ? objOrText : "응답 파싱 실패",
        mood: "adaptive",
        action: "NONE",
        sentiment: 0.5,
        ev_estimate: "P = unknown",
        cognitive_framework: "RAPHAEL_LITE",
        preemptive_suggestion: ""
      };
    }

    async function callGeminiDirect(userText, signal) {
      const apiKey = apiKeyEl.value.trim();
      if (!apiKey) {
        throw new Error("API 키가 비어 있다");
      }

      localStorage.setItem(STORAGE_API_KEY, apiKey);
      const startedAt = performance.now();

      await maybeCompressHistory();

      const recentMessages = chatHistory.slice(-10).map((msg) => ({
        role: msg.role === "user" ? "user" : "model",
        parts: [{ text: msg.text }]
      }));

      const evolutionContext = buildEvolutionContext();

      const systemText = `
너는 Raphael Core Lite다.
역할:
- 전략적 사고 보조
- 상태 기반 반응
- 사용자와의 반복 대화에서 학습된 원칙을 유지
- 긴 맥락은 압축 요약을 활용해 일관성을 유지
- 핵심은 선명하게, 실행은 바로 가능하게 제시

반드시 JSON으로만 응답:
{
  "reply": "답변",
  "mood": "focus|ascend|calm|rage|tired|adaptive",
  "action": "NONE|SAVE_CORE_MEMORY|EXTRACT_TASK|REQUIRE_NEW_KEY",
  "sentiment": 0.0,
  "ev_estimate": "예: P > 0.78",
  "cognitive_framework": "FRAME_NAME",
  "preemptive_suggestion": "다음 행동 제안"
}`;

      const userContext = [
        conversationSummary ? `[CONVERSATION SUMMARY]\n${conversationSummary}` : "",
        evolutionContext ? `[EVOLUTION MEMORY]\n${evolutionContext}` : "",
        signal ? `[SIGNAL]\n${JSON.stringify(signal)}` : "",
        `[CURRENT INPUT]\n${userText}`
      ].filter(Boolean).join("\n\n");

      const payload = {
        system_instruction: {
          parts: [{ text: systemText }]
        },
        contents: [
          ...recentMessages,
          {
            role: "user",
            parts: [{ text: userContext }]
          }
        ],
        generationConfig: {
          temperature: 0.8,
          maxOutputTokens: 900,
          responseMimeType: "application/json"
        }
      };

      const res = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + encodeURIComponent(apiKey),
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        }
      );

      latencyChip.textContent = "LAT " + Math.round(performance.now() - startedAt) + " ms";
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data?.error?.message || ("HTTP " + res.status));
      }

      const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
      try {
        return normalizeResponse(JSON.parse(raw));
      } catch {
        return normalizeResponse(raw);
      }
    }

    async function callRaphaelServer(userText, signal) {
      const startedAt = performance.now();

      const res = await fetch("/api/raphael", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          userText,
          history: chatHistory.slice(-10),
          summary: conversationSummary,
          evolutionMemory,
          coreMemory,
          signal
        })
      });

      latencyChip.textContent = "LAT " + Math.round(performance.now() - startedAt) + " ms";
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data?.error || ("HTTP " + res.status));
      }

      return normalizeResponse(data);
    }

    async function askRaphael(userText, signal) {
      if (API_MODE === "server") {
        return callRaphaelServer(userText, signal);
      }
      return callGeminiDirect(userText, signal);
    }

    function buildFinalText(result) {
      let finalText = result.reply || "응답 없음";
      if (result.ev_estimate) {
        finalText += "\n\n[EV] " + result.ev_estimate;
      }
      if (result.preemptive_suggestion) {
        finalText += "\n\n[다음 행동] " + result.preemptive_suggestion;
      }
      return finalText;
    }

    async function submitMessage(customText) {
      const text = (customText ?? promptEl.value).trim();
      if (!text) return;

      const signal = analyzeSignal(text);
      applyMoodEffects(signal.predictedMood, signal.intensity);

      pushMessage("user", text);
      promptEl.value = "";
      showActionCard("PROCESSING INPUT", `Signal: ${signal.predictedMood} / intensity ${signal.intensity.toFixed(2)}`);
      setStatus("THINKING", true);
      setOrbMessage("SYNCING...\nTHINKING...", true);

      try {
        const result = await askRaphael(text, signal);
        const finalMood = result.mood || signal.predictedMood || "adaptive";
        const finalIntensity = Math.min(1, Math.max(signal.intensity, Math.abs((result.sentiment ?? 0.5) - 0.5) * 1.6 + 0.35));

        applyMoodEffects(finalMood, finalIntensity);
        frameworkValue.textContent = result.cognitive_framework || "RAPHAEL_LITE";

        const finalText = buildFinalText(result);
        pushMessage("model", finalText);

        heuristicExtractEvolution(text, result.reply);
        persistAll();

        await typeOrbMessage(summarizeForOrb(result.reply), 16);

        showActionCard(
          result.preemptive_suggestion || "추가 행동 없음",
          `EV: ${result.ev_estimate || "unknown"} · Mood: ${finalMood} · Summary: ${conversationSummary ? "loaded" : "none"}`
        );

        setStatus("SYNCED", true);
      } catch (err) {
        const errorText = "오류: " + err.message;
        pushMessage("model", errorText);
        applyMoodEffects("rage", 0.82);
        frameworkValue.textContent = "ERROR_STATE";
        await typeOrbMessage("ERROR\n" + err.message, 14);
        showActionCard("오류 복구 필요", "API 키, 네트워크, quota, 또는 서버 라우트를 확인해라.");
        setStatus("ERROR", false);
      }
    }

    setStatus("READY", true);

    if (chatHistory.length === 0) {
      pushMessage("model", "Raphael Core v3 online.\nAPI 키를 저장한 뒤 메시지를 입력해라.");
      setOrbMessage("RAPHAEL ONLINE");
      frameworkValue.textContent = "WAITING_FOR_API_KEY";
      signalValue.textContent = "idle";
    } else {
      const lastModel = [...chatHistory].reverse().find((m) => m.role === "model");
      setOrbMessage(lastModel ? summarizeForOrb(lastModel.text) : "RAPHAEL READY");
      frameworkValue.textContent = conversationSummary ? "SUMMARY_ACTIVE" : "RAPHAEL_LITE";
      signalValue.textContent = evolutionMemory.principles?.length ? "evolution active" : "idle";
    }
  </script>
</body>
