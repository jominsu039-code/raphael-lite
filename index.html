<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>Raphael Core Lite</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-0: #04050a;
      --bg-1: #0a0b15;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-2: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.10);
      --text: #f3f6ff;
      --muted: rgba(243, 246, 255, 0.66);
      --accent: #8d6bff;
      --accent-2: #5a36ff;
      --danger: #ff5f6d;
      --ok: #52d38b;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
      --ring-glow: rgba(130, 92, 255, 0.45);
      --orb-core: radial-gradient(circle at 35% 30%, #d8cbff 0%, #9e84ff 22%, #6441ff 46%, #24145a 68%, #090914 100%);
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 50% -10%, rgba(129, 93, 255, 0.18), transparent 36%),
        radial-gradient(circle at 85% 20%, rgba(82, 147, 255, 0.08), transparent 24%),
        linear-gradient(180deg, #06070d 0%, #070911 30%, #04050a 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      overflow: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.045;
      background-image:
        radial-gradient(rgba(255,255,255,0.35) 0.6px, transparent 0.6px);
      background-size: 8px 8px;
      mix-blend-mode: soft-light;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100dvh;
      max-width: 900px;
      margin: 0 auto;
      padding: 12px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.045));
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .brand-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.2px;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .hero {
      padding: 14px 14px 10px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      justify-items: center;
    }

    .orb-zone {
      position: relative;
      width: min(64vw, 300px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
    }

    .halo {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(127, 98, 255, 0.22) 0%, rgba(127, 98, 255, 0.08) 38%, transparent 70%);
      filter: blur(18px);
      transform: scale(1.1);
      animation: breathe 4.2s ease-in-out infinite;
    }

    .outer-ring,
    .mid-ring,
    .sigil-ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .outer-ring {
      inset: 6%;
      border: 2px solid rgba(155, 132, 255, 0.42);
      box-shadow:
        0 0 22px rgba(138, 101, 255, 0.35),
        inset 0 0 18px rgba(163, 138, 255, 0.14);
      animation: spin 14s linear infinite;
    }

    .outer-ring::before,
    .outer-ring::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .mid-ring {
      inset: 14%;
      border: 1px dashed rgba(196, 183, 255, 0.40);
      animation: spinReverse 12s linear infinite;
      opacity: 0.9;
    }

    .sigil-ring {
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 59%, rgba(150,115,255,0.12) 60%, transparent 61%),
        conic-gradient(
          from 0deg,
          transparent 0deg 14deg,
          rgba(214, 205, 255, 0.85) 14deg 16deg,
          transparent 16deg 42deg,
          rgba(214, 205, 255, 0.55) 42deg 44deg,
          transparent 44deg 72deg,
          rgba(214, 205, 255, 0.85) 72deg 74deg,
          transparent 74deg 104deg,
          rgba(214, 205, 255, 0.55) 104deg 106deg,
          transparent 106deg 134deg,
          rgba(214, 205, 255, 0.85) 134deg 136deg,
          transparent 136deg 164deg,
          rgba(214, 205, 255, 0.55) 164deg 166deg,
          transparent 166deg 194deg,
          rgba(214, 205, 255, 0.85) 194deg 196deg,
          transparent 196deg 224deg,
          rgba(214, 205, 255, 0.55) 224deg 226deg,
          transparent 226deg 254deg,
          rgba(214, 205, 255, 0.85) 254deg 256deg,
          transparent 256deg 284deg,
          rgba(214, 205, 255, 0.55) 284deg 286deg,
          transparent 286deg 314deg,
          rgba(214, 205, 255, 0.85) 314deg 316deg,
          transparent 316deg 344deg,
          rgba(214, 205, 255, 0.55) 344deg 346deg,
          transparent 346deg 360deg
        );
      opacity: 0.35;
      animation: spin 24s linear infinite;
      filter: drop-shadow(0 0 12px rgba(164, 132, 255, 0.25));
    }

    .orb {
      position: absolute;
      inset: 22%;
      border-radius: 50%;
      background: var(--orb-core);
      box-shadow:
        0 0 24px rgba(127, 98, 255, 0.48),
        0 0 60px rgba(107, 67, 255, 0.18),
        inset 0 0 24px rgba(255,255,255,0.12),
        inset -10px -18px 24px rgba(0,0,0,0.30);
      overflow: hidden;
      animation: orbPulse 3.8s ease-in-out infinite;
    }

    .orb::before {
      content: "";
      position: absolute;
      inset: 7%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.22), transparent 26%),
        radial-gradient(circle at 65% 70%, rgba(31, 7, 94, 0.65), transparent 34%),
        radial-gradient(circle at 48% 48%, rgba(158, 133, 255, 0.16), transparent 40%);
      mix-blend-mode: screen;
    }

    .orb::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        conic-gradient(from 140deg, transparent 0 8%, rgba(255,255,255,0.08) 10%, transparent 14%, transparent 50%, rgba(255,255,255,0.07) 55%, transparent 60%);
      filter: blur(4px);
      animation: shimmer 6s linear infinite;
    }

    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(220, 213, 255, 0.82);
      box-shadow: 0 0 10px rgba(182, 157, 255, 0.45);
      animation: floatParticle linear infinite;
    }

    .core-readout {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .readout {
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .readout-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .readout-value {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
      word-break: break-word;
    }

    .messages {
      min-height: 0;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 88%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.48;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      animation: msgIn 0.22s ease;
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(118,92,255,0.86), rgba(67,40,143,0.96));
      border: 1px solid rgba(189, 175, 255, 0.18);
      box-shadow: 0 12px 30px rgba(72, 47, 158, 0.30);
    }

    .msg.model {
      align-self: flex-start;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .composer {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .api-row,
    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .field {
      width: 100%;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 13px 14px;
      outline: none;
      font: inherit;
    }

    .field::placeholder {
      color: rgba(255,255,255,0.42);
    }

    textarea.field {
      resize: none;
      min-height: 58px;
      max-height: 130px;
    }

    .btn {
      border: none;
      outline: none;
      border-radius: 16px;
      padding: 0 16px;
      min-width: 88px;
      font: inherit;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #8b6bff, #5636ff);
      box-shadow: 0 10px 26px rgba(92, 58, 255, 0.28);
    }

    .btn.secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: none;
      color: var(--text);
    }

    .footer-note {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
      padding: 0 2px;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      background: var(--ok);
      box-shadow: 0 0 10px rgba(82, 211, 139, 0.45);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinReverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1.04); opacity: 0.78; }
      50% { transform: scale(1.12); opacity: 1; }
    }

    @keyframes orbPulse {
      0%, 100% { transform: scale(0.985); }
      50% { transform: scale(1.02); }
    }

    @keyframes shimmer {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatParticle {
      0% { transform: translate3d(0, 0, 0) scale(0.9); opacity: 0; }
      20% { opacity: 0.9; }
      100% { transform: translate3d(var(--tx), var(--ty), 0) scale(1.2); opacity: 0; }
    }

    @media (max-width: 480px) {
      .app {
        padding: 10px;
        gap: 10px;
      }

      .topbar {
        padding: 12px 13px;
      }

      .brand-title {
        font-size: 17px;
      }

      .core-readout {
        grid-template-columns: 1fr;
      }

      .api-row,
      .input-row {
        grid-template-columns: 1fr;
      }

      .btn {
        min-height: 48px;
      }

      .msg {
        max-width: 92%;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="app">
    <div class="card topbar">
      <div class="brand">
        <div class="brand-title">Raphael Core</div>
        <div class="brand-sub">Transcendent Sanctuary · Mobile Lite Build</div>
      </div>
      <div class="chip-row">
        <div class="chip" id="statusChip"><span class="status-dot"></span>READY</div>
        <div class="chip" id="latencyChip">LAT -- ms</div>
      </div>
    </div>

    <div class="card hero">
      <div class="orb-zone">
        <div class="halo"></div>
        <div class="sigil-ring"></div>
        <div class="outer-ring"></div>
        <div class="mid-ring"></div>
        <div class="orb" id="orb"></div>
        <div class="particles" id="particles"></div>
      </div>

      <div class="core-readout">
        <div class="readout">
          <div class="readout-label">CURRENT MOOD</div>
          <div class="readout-value" id="moodValue">adaptive</div>
        </div>
        <div class="readout">
          <div class="readout-label">COGNITIVE FRAMEWORK</div>
          <div class="readout-value" id="frameworkValue">RAPHAEL_LITE</div>
        </div>
      </div>
    </div>

    <div class="card messages" id="messages"></div>

    <div class="card composer">
      <div class="api-row">
        <input
          id="apiKey"
          class="field"
          type="password"
          placeholder="Gemini API Key 입력"
        />
        <button class="btn secondary" id="saveKeyBtn">키 저장</button>
      </div>

      <div class="input-row">
        <textarea
          id="prompt"
          class="field"
          placeholder="명령 또는 메시지를 입력해라"
        ></textarea>
        <button class="btn" id="sendBtn">전송</button>
      </div>

      <div style="display:flex; gap:8px;">
        <button class="btn secondary" id="clearBtn" style="flex:1;">기록 초기화</button>
        <button class="btn secondary" id="testBtn" style="flex:1;">연결 테스트</button>
      </div>

      <div class="footer-note">
        현재 버전은 폰 단독 배포용 압축판이다. 구조는 단일 파일이며, Gemini는 브라우저에서 직접 호출한다.
        테스트 후에는 노출된 키를 폐기하고 다음 버전에서 서버 경유형으로 옮기는 게 맞다.
      </div>
    </div>
  </div>

  <script>
    const STORAGE_MESSAGES = "raphael_core_lite_messages_v2";
    const STORAGE_API_KEY = "raphael_core_lite_api_key_v2";

    const messagesEl = document.getElementById("messages");
    const promptEl = document.getElementById("prompt");
    const apiKeyEl = document.getElementById("apiKey");
    const saveKeyBtn = document.getElementById("saveKeyBtn");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const testBtn = document.getElementById("testBtn");
    const moodValue = document.getElementById("moodValue");
    const frameworkValue = document.getElementById("frameworkValue");
    const statusChip = document.getElementById("statusChip");
    const latencyChip = document.getElementById("latencyChip");
    const orb = document.getElementById("orb");
    const particlesEl = document.getElementById("particles");

    let chatHistory = JSON.parse(localStorage.getItem(STORAGE_MESSAGES) || "[]");

    const savedKey = localStorage.getItem(STORAGE_API_KEY);
    if (savedKey) apiKeyEl.value = savedKey;

    function setStatus(text, ok = true) {
      statusChip.innerHTML = '<span class="status-dot"></span>' + text;
      const dot = statusChip.querySelector(".status-dot");
      if (dot) {
        dot.style.background = ok ? "var(--ok)" : "var(--danger)";
        dot.style.boxShadow = ok
          ? "0 0 10px rgba(82, 211, 139, 0.45)"
          : "0 0 10px rgba(255, 95, 109, 0.45)";
      }
    }

    function renderMessages() {
      messagesEl.innerHTML = "";
      chatHistory.forEach((msg) => {
        const div = document.createElement("div");
        div.className = "msg " + msg.role;
        div.textContent = msg.text;
        messagesEl.appendChild(div);
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function pushMessage(role, text) {
      chatHistory.push({ role, text });
      localStorage.setItem(STORAGE_MESSAGES, JSON.stringify(chatHistory));
      renderMessages();
    }

    function createParticles() {
      particlesEl.innerHTML = "";
      for (let i = 0; i < 18; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = (50 + (Math.random() * 54 - 27)) + "%";
        p.style.top = (50 + (Math.random() * 54 - 27)) + "%";
        p.style.setProperty("--tx", (Math.random() * 80 - 40) + "px");
        p.style.setProperty("--ty", (Math.random() * 80 - 40) + "px");
        p.style.animationDuration = (2.8 + Math.random() * 3.6) + "s";
        p.style.animationDelay = (Math.random() * 2.5) + "s";
        particlesEl.appendChild(p);
      }
    }

    function setMood(mood) {
      const palettes = {
        focus: {
          core: "radial-gradient(circle at 35% 30%, #d7fbff 0%, #92ebff 22%, #39b8ff 44%, #103d8b 68%, #071220 100%)",
          glow: "rgba(70, 190, 255, 0.42)"
        },
        ascend: {
          core: "radial-gradient(circle at 35% 30%, #fff8db 0%, #ffe9a4 20%, #ffc45d 42%, #8e5b14 68%, #1a1208 100%)",
          glow: "rgba(255, 191, 95, 0.40)"
        },
        calm: {
          core: "radial-gradient(circle at 35% 30%, #e1ffe7 0%, #8bf2ba 22%, #38b772 44%, #0d5032 68%, #08150f 100%)",
          glow: "rgba(78, 214, 141, 0.36)"
        },
        rage: {
          core: "radial-gradient(circle at 35% 30%, #ffd3c7 0%, #ff8b6f 22%, #ff4f2b 44%, #6a190f 68%, #160909 100%)",
          glow: "rgba(255, 96, 66, 0.38)"
        },
        tired: {
          core: "radial-gradient(circle at 35% 30%, #e4e4ff 0%, #afaed5 22%, #76719f 44%, #2d2a4e 68%, #0c0b16 100%)",
          glow: "rgba(153, 149, 210, 0.28)"
        },
        adaptive: {
          core: "radial-gradient(circle at 35% 30%, #d8cbff 0%, #9e84ff 22%, #6441ff 46%, #24145a 68%, #090914 100%)",
          glow: "rgba(130, 92, 255, 0.45)"
        }
      };

      const picked = palettes[mood] || palettes.adaptive;
      orb.style.background = picked.core;
      orb.style.boxShadow =
        "0 0 24px " + picked.glow + ", 0 0 60px rgba(107, 67, 255, 0.18), inset 0 0 24px rgba(255,255,255,0.12), inset -10px -18px 24px rgba(0,0,0,0.30)";
      moodValue.textContent = mood || "adaptive";
    }

    function saveKey() {
      const key = apiKeyEl.value.trim();
      if (!key) {
        setStatus("KEY EMPTY", false);
        return;
      }
      localStorage.setItem(STORAGE_API_KEY, key);
      setStatus("KEY SAVED", true);
    }

    function normalizeResponse(objOrText) {
      if (typeof objOrText === "object" && objOrText !== null) {
        return {
          reply: objOrText.reply || "응답 없음",
          mood: objOrText.mood || "adaptive",
          action: objOrText.action || "NONE",
          sentiment: typeof objOrText.sentiment === "number" ? objOrText.sentiment : 0.5,
          ev_estimate: objOrText.ev_estimate || "P = unknown",
          cognitive_framework: objOrText.cognitive_framework || "RAPHAEL_LITE",
          preemptive_suggestion: objOrText.preemptive_suggestion || ""
        };
      }

      return {
        reply: typeof objOrText === "string" ? objOrText : "응답 파싱 실패",
        mood: "adaptive",
        action: "NONE",
        sentiment: 0.5,
        ev_estimate: "P = unknown",
        cognitive_framework: "RAPHAEL_LITE",
        preemptive_suggestion: ""
      };
    }

    async function askGemini(userText) {
      const apiKey = apiKeyEl.value.trim();
      if (!apiKey) {
        throw new Error("API 키가 비어 있다");
      }

      localStorage.setItem(STORAGE_API_KEY, apiKey);

      const startedAt = performance.now();

      const historyContents = chatHistory.slice(-8).map((msg) => ({
        role: msg.role === "user" ? "user" : "model",
        parts: [{ text: msg.text }]
      }));

      const systemText = `
너는 Raphael Core Lite다.
역할: 전략적 사고 보조, 응답 명확성, 상태 기반 반응.
반드시 JSON으로만 응답:
{
  "reply": "답변",
  "mood": "focus|ascend|calm|rage|tired|adaptive",
  "action": "NONE|SAVE_CORE_MEMORY|EXTRACT_TASK|REQUIRE_NEW_KEY",
  "sentiment": 0.0,
  "ev_estimate": "예: P > 0.78",
  "cognitive_framework": "FRAME_NAME",
  "preemptive_suggestion": "다음 행동 제안"
}
`;

      const payload = {
        system_instruction: {
          parts: [{ text: systemText }]
        },
        contents: [
          ...historyContents,
          {
            role: "user",
            parts: [{ text: userText }]
          }
        ],
        generationConfig: {
          temperature: 0.8,
          maxOutputTokens: 700,
          responseMimeType: "application/json"
        }
      };

      const res = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + encodeURIComponent(apiKey),
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        }
      );

      const latency = Math.round(performance.now() - startedAt);
      latencyChip.textContent = "LAT " + latency + " ms";

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data?.error?.message || ("HTTP " + res.status));
      }

      const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
      try {
        return normalizeResponse(JSON.parse(raw));
      } catch {
        return normalizeResponse(raw);
      }
    }

    async function submitMessage(customText) {
      const text = (customText ?? promptEl.value).trim();
      if (!text) return;

      pushMessage("user", text);
      promptEl.value = "";
      setStatus("THINKING", true);

      try {
        const result = await askGemini(text);
        setMood(result.mood);
        frameworkValue.textContent = result.cognitive_framework || "RAPHAEL_LITE";

        let finalText = result.reply || "응답 없음";
        if (result.ev_estimate) {
          finalText += "\n\n[EV] " + result.ev_estimate;
        }
        if (result.preemptive_suggestion) {
          finalText += "\n\n[다음 행동] " + result.preemptive_suggestion;
        }

        pushMessage("model", finalText);
        setStatus("SYNCED", true);
      } catch (err) {
        pushMessage("model", "오류: " + err.message);
        setMood("rage");
        frameworkValue.textContent = "ERROR_STATE";
        setStatus("ERROR", false);
      }
    }

    saveKeyBtn.addEventListener("click", saveKey);
    sendBtn.addEventListener("click", () => submitMessage());

    clearBtn.addEventListener("click", () => {
      chatHistory = [];
      localStorage.removeItem(STORAGE_MESSAGES);
      renderMessages();
      setMood("adaptive");
      frameworkValue.textContent = "RAPHAEL_LITE";
      latencyChip.textContent = "LAT -- ms";
      setStatus("CLEARED", true);
    });

    testBtn.addEventListener("click", () => {
      submitMessage("연결 테스트. 현재 상태를 간단히 보고해.");
    });

    promptEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        submitMessage();
      }
    });

    renderMessages();
    createParticles();
    setMood("adaptive");
    setStatus("READY", true);

    if (chatHistory.length === 0) {
      pushMessage("model", "Raphael Core Lite online.\nGemini API 키를 저장한 뒤 명령을 입력해라.");
    }
  </script>
</body>
</html>
